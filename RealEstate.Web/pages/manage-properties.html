<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Properties - Real Estate</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <a href="../index.html" class="logo">🏠 RealEstate</a>

        <nav>
            <a href="../index.html">Home</a>
            <a href="properties.html">Properties</a>
            <a href="contact.html">Contact</a>
        </nav>

        <div id="navAuth"></div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="page-content">

        <section class="admin-dashboard">

            <div class="admin-header">
                <div>
                    <h1>Manage Properties</h1>
                    <p>View, manage, and delete property listings.</p>
                </div>

                <div class="admin-header-actions">
                    <a href="admin.html" class="admin-secondary-btn">
                        ← Back to Dashboard
                    </a>

                    <a href="add-property.html" class="admin-primary-btn">
                        + Add Property
                    </a>
                </div>
            </div>

            <div id="manageAlert" class="alert"></div>

            <div class="manage-table-wrapper">
                <table class="manage-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Property</th>
                            <th>Type</th>
                            <th>Location</th>
                            <th>Price</th>
                            <th>Rooms</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="propertiesTableBody">
                        <tr>
                            <td colspan="7" style="text-align:center; padding: 30px;">
                                Loading properties...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 RealEstate. All rights reserved.</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/manage-properties.js"></script>
</body>
</html>
